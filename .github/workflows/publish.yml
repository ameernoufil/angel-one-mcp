name: publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: install deps
        run: npm ci

      - name: build
        run: npm run build

      - name: publish
        run: npm publish --provenance --access public
